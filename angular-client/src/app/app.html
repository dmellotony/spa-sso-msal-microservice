<div class="container">

  <!-- NOT LOGGED IN -->
  <div *ngIf="!isLoggedIn()">
    <h1>Welcome</h1>
    <p>Please sign in to continue</p>

    <button (click)="login()">
      Login with Microsoft
    </button>
  </div>

  <!-- LOGGED IN -->
  <div *ngIf="isLoggedIn()">

    <h1>User Dashboard</h1>

    <button (click)="logout()">
      Logout
    </button>

    <p *ngIf="loading">Loading user...</p>

    <div *ngIf="user" class="card">
      <h2>User Details</h2>

      <p><strong>Name:</strong> {{ user.name }}</p>
      <p><strong>Email:</strong> {{ user.emailAddress }}</p>
      <p><strong>Role:</strong> {{ user.role }}</p>
    </div>

  </div>

</div>
